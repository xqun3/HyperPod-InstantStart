apiVersion: ray.io/v1
kind: RayJob
metadata:
  name: d-training-a1
  namespace: default
spec:
  entrypoint: bash /s3/train-recipes/ray-ddp/run-all.sh
  # backoffLimit: 0
  shutdownAfterJobFinishes: true
  ttlSecondsAfterFinished: 3600
  rayClusterSpec:
    rayVersion: '2.9.0'
    headGroupSpec:
      rayStartParams:
        dashboard-host: '0.0.0.0'
        dashboard-port: '8265'
      template:
        metadata:
          labels:
            hami.io/webhook: ignore
        spec:
          nodeSelector:
            beta.kubernetes.io/instance-type: ml.g6.12xlarge
          containers:
          - name: ray-head
            image: 633205212955.dkr.ecr.us-west-2.amazonaws.com/hypd-verl:latest
            resources:
              limits:
                # cpu: 20
                # memory: 80Gi
                nvidia.com/gpu: 4
                vpc.amazonaws.com/efa: 1
              requests:
                # cpu: 20
                # memory: 80Gi
                nvidia.com/gpu: 4
                vpc.amazonaws.com/efa: 1
            env:
            # - name: PYTHONPATH
            #   value: "/verl_workspace:/verl_workspace/verl"
            - name: FI_PROVIDER
              value: "efa"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            - name: INSTRT_NUM_NODES
              value: "2"
            - name: INSTRT_PROC_PER_NODE
              value: "4"
            volumeMounts:
            - name: persistent-storage-s3
              mountPath: /s3
              readOnly: false
            - name: shmem
              mountPath: /dev/shm
            - name: local
              mountPath: /local
            - name: inst-nvme
              mountPath: /ckpt-path
            - name: local-cache
              mountPath: /root/.cache
          volumes:
          - name: shmem
            hostPath: 
              path: /dev/shm
          - name: local
            hostPath:
              path: /mnt/k8s-disks/0
          - name: local-cache
            hostPath:
              path: /opt/dlami/nvme/.cache
          - name: inst-nvme
            hostPath:
              path: /opt/dlami/nvme/checkpoints/
          - name: persistent-storage-s3
            persistentVolumeClaim:
              claimName: s3-claim
    workerGroupSpecs:
    - replicas: 1
      minReplicas: 0
      maxReplicas: 3
      groupName: worker-group
      rayStartParams: {}
      template:
        metadata:
          labels:
            hami.io/webhook: ignore
        spec:
          nodeSelector:
            beta.kubernetes.io/instance-type: ml.g6.12xlarge
          containers:
          - name: ray-worker
            image: 633205212955.dkr.ecr.us-west-2.amazonaws.com/hypd-verl:latest
            resources:
              limits:
                # cpu: 20
                # memory: 80Gi
                nvidia.com/gpu: 4
                vpc.amazonaws.com/efa: 1
              requests:
                # cpu: 20
                # memory: 80Gi
                nvidia.com/gpu: 4
                vpc.amazonaws.com/efa: 1
            env:
            # - name: PYTHONPATH
            #   value: "/verl_workspace:/verl_workspace/verl"
            - name: FI_PROVIDER
              value: "efa"
            - name: NCCL_DEBUG
              value: "INFO"
            - name: NCCL_SOCKET_IFNAME
              value: "eth0"
            - name: INSTRT_NUM_NODES
              value: "2"
            - name: INSTRT_PROC_PER_NODE
              value: "4"
            volumeMounts:
            - name: persistent-storage-s3
              mountPath: /s3
              readOnly: false
            - name: shmem
              mountPath: /dev/shm
            - name: local
              mountPath: /local
            - name: inst-nvme
              mountPath: /ckpt-path
            - name: local-cache
              mountPath: /root/.cache
          volumes:
          - name: shmem
            hostPath: 
              path: /dev/shm
          - name: local
            hostPath:
              path: /mnt/k8s-disks/0
          - name: local-cache
            hostPath:
              path: /opt/dlami/nvme/.cache
          - name: inst-nvme
            hostPath:
              path: /opt/dlami/nvme/checkpoints/
          - name: persistent-storage-s3
            persistentVolumeClaim:
              claimName: s3-claim
