---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVENGINE-MODEL_TAG-inference
  labels:
    app: SERVENGINE-MODEL_TAG-inference
    model-type: "SERVENGINE"
    deployment-tag: "MODEL_TAG"
spec:
  replicas: REPLICAS_COUNT
  selector:
    matchLabels:
      app: SERVENGINE-MODEL_TAG-inference
  template:
    metadata:
      labels:
        app: SERVENGINE-MODEL_TAG-inference
        model-type: "SERVENGINE"
    spec:
      affinity:
        nodeAffinity:
          # 优先级调度
          preferredDuringSchedulingIgnoredDuringExecution:

          - weight: 100
            preference:
              matchExpressions:
              - key: sagemaker.amazonaws.com/compute-type
                operator: In
                values: ["hyperpod"]
          - weight: 90
            preference:
              matchExpressions:
              - key: alpha.eksctl.io/nodegroup-name
                operator: Exists

          - weight: 80
            preference:
              matchExpressions:
              - key: karpenter.sh/capacity-type
                operator: Exists
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
HYBRID_NODE_SELECTOR_TERMS

      containers:
        - name: SERVENGINE
          image: DOCKER_IMAGE
          RESOURCES_SECTION
          command: ENTRY_CMD
          ports:
            - containerPort: PORT_NUMBER
              name: http
          volumeMounts:
            - name: persistent-storage-s3
              mountPath: /s3
              readOnly: true
            - name: local-cache
              mountPath: /root/.cache
            - name: shm
              mountPath: /dev/shm
          env:HF_TOKEN_ENV
            - name: HF_HOME
              value: "/root/.cache/huggingface"
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
      volumes:
        - name: persistent-storage-s3
          persistentVolumeClaim:
            claimName: s3-claim
        - name: local-cache
          hostPath:
            path: /opt/dlami/nvme/.cache
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"