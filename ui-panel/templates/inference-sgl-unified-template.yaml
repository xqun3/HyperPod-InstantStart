---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: SERVENGINE-unified-MODEL_TAG-inference
  labels:
    model-type: "SERVENGINE"
spec:
  replicas: REPLICAS_COUNT
  selector:
    matchLabels:
      app: SERVENGINE-unified-MODEL_TAG-inference
  template:
    metadata:
      labels:
        app: SERVENGINE-unified-MODEL_TAG-inference
    spec:
      priorityClassName: od-spot-priority
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 20
            preference:
              matchExpressions:
              - key: capacity-type
                operator: In
                values: ["on-demand"]
          - weight: 10
            preference:
              matchExpressions:
              - key: capacity-type
                operator: In
                values: ["spot"]
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-type
                operator: In
                values: ["gpu"]
            - matchExpressions:
              - key: sagemaker.amazonaws.com/compute-type
                operator: In
                values: ["hyperpod"]
      containers:
        - name: SERVENGINE
          image: DOCKER_IMAGE
          resources:
            limits:
              nvidia.com/gpu: GPU_COUNT
            requests:
              # cpu: "4"
              # memory: 8Gi
              nvidia.com/gpu: GPU_COUNT
          command: ENTRY_CMD
          ports:
            - containerPort: PORT_NUMBER
              name: http
          volumeMounts:
            - name: persistent-storage-s3
              mountPath: /s3
              readOnly: true
            - name: local-cache
              mountPath: /root/.cache
            - name: shm
              mountPath: /dev/shm
          env:
            - name: TRANSFORMERS_CACHE
              value: "/root/.cache/huggingface"
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
      volumes:
        - name: persistent-storage-s3
          persistentVolumeClaim:
            claimName: s3-claim
        - name: local-cache
          hostPath:
            path: /opt/dlami/nvme/.cache
            type: DirectoryOrCreate
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
      tolerations:
        - key: "nvidia.com/gpu"
          value: "true"
          operator: "Equal"
          effect: "NoSchedule"