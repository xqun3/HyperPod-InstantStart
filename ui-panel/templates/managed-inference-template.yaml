apiVersion: inference.sagemaker.aws.amazon.com/v1
kind: InferenceEndpointConfig
metadata:
  name: DEPLOYMENT_NAME
  namespace: defaultHAMI_LABEL
spec:
  modelName: MODEL_NAME
  invocationEndpoint: v1/chat/completions
  instanceType: INSTANCE_TYPE
  replicas: REPLICAS_COUNTAUTOSCALING_SPEC
  metrics:
    enabled: true
    modelMetrics:
      port: PORT_NUMBER
  modelSourceConfig:
    modelSourceType: s3
    s3Storage:
      bucketName: S3_BUCKET_NAME
      region: AWS_REGION
    modelLocation: MODEL_LOCATIONKV_CACHE_SPEC
INTELLIGENT_ROUTING_SPEC
  worker:
    image: DOCKER_IMAGE
    args:WORKER_ARGS
    modelInvocationPort:
      containerPort: PORT_NUMBER
    modelVolumeMount:
      name: model-weights
    resources:
      requests:CPU_REQUEST
        memory: MEMORY_REQUEST
        nvidia.com/gpu: "GPU_COUNT"GPU_MEMORY
      limits:
        nvidia.com/gpu: "GPU_COUNT"GPU_MEMORY
    environmentVariables:
      - name: HF_HUB_OFFLINE
        value: "1"SESSION_KEY_ENV
